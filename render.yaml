services:

  # ──────────────────────────────────────────────
  # Backend — Node.js API
  # ──────────────────────────────────────────────
  - type: web
    name: focusflow-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false           # Set in Render dashboard
      - key: TOKEN_KEY
        sync: false           # JWT secret — any long random string
      - key: EMAIL_USER
        sync: false           # Gmail address for OTP emails
      - key: EMAIL_PASS
        sync: false           # Gmail App Password (not your account password)
      - key: HF_API_KEY
        sync: false           # Hugging Face API key for text summarization
      - key: FRONTEND_URL
        sync: false           # e.g. https://focusflow-frontend.onrender.com

  # ──────────────────────────────────────────────
  # Frontend — React + Vite static site
  # ──────────────────────────────────────────────
  - type: web
    name: focusflow-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false           # e.g. https://focusflow-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
